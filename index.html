<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macro Tracker | D3V</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --card: #1a1a25;
      --text: #f0f0f5;
      --text2: #8888a0;
      --protein: #ff6b6b;
      --carbs: #feca57;
      --fat: #48dbfb;
      --calories: #a855f7;
      --fiber: #4ade80;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .back {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .header .back:hover { color: var(--text); }

    /* Date nav */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .date-nav button {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 14px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .date-nav button:hover { background: rgba(255,255,255,0.1); }
    .date-nav .current-date {
      font-size: 1.1rem;
      font-weight: 600;
      min-width: 200px;
      text-align: center;
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 30px;
    }
    .summary-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 18px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }
    .summary-card.calories::before { background: var(--calories); }
    .summary-card.protein::before { background: var(--protein); }
    .summary-card.carbs::before { background: var(--carbs); }
    .summary-card.fat::before { background: var(--fat); }
    .summary-card.fiber::before { background: var(--fiber); }
    .summary-card .summary-value {
      font-size: 1.6rem;
      font-weight: 700;
    }
    .summary-card.calories .summary-value { color: var(--calories); }
    .summary-card.protein .summary-value { color: var(--protein); }
    .summary-card.carbs .summary-value { color: var(--carbs); }
    .summary-card.fat .summary-value { color: var(--fat); }
    .summary-card.fiber .summary-value { color: var(--fiber); }
    .summary-card .summary-label {
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 4px;
    }
    .summary-card .summary-goal {
      font-size: 0.7rem;
      color: var(--text2);
      margin-top: 2px;
    }

    /* Circular progress */
    .calories-ring {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }
    .ring-container {
      position: relative;
      width: 180px;
      height: 180px;
    }
    .ring-container svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }
    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 12;
    }
    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 502;
      stroke-dashoffset: 502;
      transition: stroke-dashoffset 1s ease;
    }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .ring-center .ring-value {
      font-size: 2.2rem;
      font-weight: 700;
    }
    .ring-center .ring-label {
      font-size: 0.8rem;
      color: var(--text2);
    }
    .ring-center .ring-remaining {
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 2px;
    }

    /* Goals settings */
    .goals-section {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 30px;
    }
    .goals-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .goals-header h3 { font-size: 1rem; }
    .goals-header button {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text2);
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .goals-header button:hover { color: var(--text); }
    .goals-inputs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .goals-inputs label {
      font-size: 0.8rem;
      color: var(--text2);
      display: block;
      margin-bottom: 4px;
    }
    .goals-inputs input {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      text-align: center;
      outline: none;
    }
    .goals-inputs input:focus { border-color: var(--calories); }

    /* Add food form */
    .add-food {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 30px;
    }
    .add-food h3 { font-size: 1rem; margin-bottom: 16px; }
    .food-form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .food-form .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .food-form input, .food-form select {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    .food-form input:focus, .food-form select:focus { border-color: var(--calories); }
    .food-form .btn-add {
      padding: 10px 20px;
      background: linear-gradient(135deg, #a855f7, #06b6d4);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.2s;
      white-space: nowrap;
    }
    .food-form .btn-add:hover { transform: translateY(-2px); }

    /* Quick add */
    .quick-add {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .quick-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s, color 0.2s;
    }
    .quick-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* Meal sections */
    .meal-section {
      margin-bottom: 24px;
    }
    .meal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .meal-header h3 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .meal-header .meal-total {
      font-size: 0.85rem;
      color: var(--text2);
    }

    /* Food items */
    .food-list { list-style: none; }
    .food-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .food-item:hover { background: rgba(255,255,255,0.03); }
    .food-item .food-name {
      flex: 1;
      font-size: 0.95rem;
    }
    .food-item .food-macros {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
    }
    .food-item .food-macros span { color: var(--text2); }
    .food-item .food-macros .cal { color: var(--calories); font-weight: 600; }
    .food-item .food-macros .pro { color: var(--protein); }
    .food-item .food-macros .carb { color: var(--carbs); }
    .food-item .food-macros .fat-val { color: var(--fat); }
    .food-item .food-delete {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .food-item:hover .food-delete { opacity: 1; }
    .food-item .food-delete:hover { color: #ef4444; }

    .empty-meal {
      text-align: center;
      padding: 20px;
      color: var(--text2);
      font-size: 0.9rem;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: repeat(3, 1fr); }
      .food-form { grid-template-columns: 1fr 1fr; }
      .goals-inputs { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .food-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>&#x1F4CA; Macro Tracker</h1>
      <a href="http://localhost:3000" class="back">&#x2190; Back to D3V</a>
    </div>

    <!-- Date Navigation -->
    <div class="date-nav">
      <button onclick="changeDate(-1)">&#x2190;</button>
      <span class="current-date" id="currentDate">Today</span>
      <button onclick="changeDate(1)">&#x2192;</button>
    </div>

    <!-- Calories Ring -->
    <div class="calories-ring">
      <div class="ring-container">
        <svg viewBox="0 0 180 180">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7"/>
              <stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="90" cy="90" r="80"/>
          <circle class="ring-fill" id="calRing" cx="90" cy="90" r="80"/>
        </svg>
        <div class="ring-center">
          <div class="ring-value" id="ringValue">0</div>
          <div class="ring-label">calories</div>
          <div class="ring-remaining" id="ringRemaining">2500 remaining</div>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-grid">
      <div class="summary-card calories">
        <div class="summary-value" id="totalCal">0</div>
        <div class="summary-label">Calories</div>
        <div class="summary-goal" id="goalCal">/ 2500</div>
      </div>
      <div class="summary-card protein">
        <div class="summary-value" id="totalPro">0g</div>
        <div class="summary-label">Protein</div>
        <div class="summary-goal" id="goalPro">/ 170g</div>
      </div>
      <div class="summary-card carbs">
        <div class="summary-value" id="totalCarb">0g</div>
        <div class="summary-label">Carbs</div>
        <div class="summary-goal" id="goalCarb">/ 260g</div>
      </div>
      <div class="summary-card fat">
        <div class="summary-value" id="totalFat">0g</div>
        <div class="summary-label">Fat</div>
        <div class="summary-goal" id="goalFat">/ 65g</div>
      </div>
      <div class="summary-card fiber">
        <div class="summary-value" id="totalFiber">0g</div>
        <div class="summary-label">Fiber</div>
        <div class="summary-goal" id="goalFiber">/ 30g</div>
      </div>
    </div>

    <!-- Goals -->
    <div class="goals-section">
      <div class="goals-header">
        <h3>&#x1F3AF; Daily Goals</h3>
        <button onclick="toggleGoals()">Edit</button>
      </div>
      <div class="goals-inputs" id="goalsInputs" style="display:none;">
        <div><label>Calories</label><input type="number" id="goalCalInput" value="2500"></div>
        <div><label>Protein (g)</label><input type="number" id="goalProInput" value="170"></div>
        <div><label>Carbs (g)</label><input type="number" id="goalCarbInput" value="260"></div>
        <div><label>Fat (g)</label><input type="number" id="goalFatInput" value="65"></div>
        <div><label>Fiber (g)</label><input type="number" id="goalFiberInput" value="30"></div>
      </div>
    </div>

    <!-- Add Food -->
    <div class="add-food">
      <h3>&#x1F35D; Add Food</h3>
      <div class="quick-add">
        <button class="quick-btn" onclick="quickAdd('Whey Scoop',120,25,3,1,0)">Whey Scoop</button>
        <button class="quick-btn" onclick="quickAdd('Banana',105,1.3,27,0.4,3.1)">Banana</button>
        <button class="quick-btn" onclick="quickAdd('Egg',78,6,0.6,5,0)">Egg</button>
        <button class="quick-btn" onclick="quickAdd('Chicken 100g',165,31,0,3.6,0)">Chicken 100g</button>
        <button class="quick-btn" onclick="quickAdd('Rice 100g',130,2.7,28,0.3,0.4)">Rice 100g</button>
        <button class="quick-btn" onclick="quickAdd('Paneer 100g',260,18,4,20,0)">Paneer 100g</button>
        <button class="quick-btn" onclick="quickAdd('Milk 200ml',130,6.5,10,7,0)">Milk 200ml</button>
        <button class="quick-btn" onclick="quickAdd('Soya Chunks 50g',175,25,12.5,1.2,6)">Soya 50g</button>
      </div>
      <div class="food-form">
        <div class="form-group">
          <label>Food Name</label>
          <input type="text" id="foodName" placeholder="e.g. Chicken Breast">
        </div>
        <div class="form-group">
          <label>Calories</label>
          <input type="number" id="foodCal" placeholder="0">
        </div>
        <div class="form-group">
          <label>Protein (g)</label>
          <input type="number" id="foodPro" placeholder="0">
        </div>
        <div class="form-group">
          <label>Carbs (g)</label>
          <input type="number" id="foodCarb" placeholder="0">
        </div>
        <div class="form-group">
          <label>Fat (g)</label>
          <input type="number" id="foodFat" placeholder="0">
        </div>
        <div class="form-group">
          <label>Fiber (g)</label>
          <input type="number" id="foodFiber" placeholder="0">
        </div>
        <div class="form-group">
          <label>Meal</label>
          <select id="foodMeal">
            <option value="breakfast">&#x2600; Breakfast</option>
            <option value="lunch">&#x1F31E; Lunch</option>
            <option value="dinner">&#x1F319; Dinner</option>
            <option value="snacks">&#x1F36A; Snacks</option>
          </select>
        </div>
        <button class="btn-add" onclick="addFood()">+ Add</button>
      </div>
    </div>

    <!-- Meals -->
    <div class="meal-section">
      <div class="meal-header">
        <h3>&#x2600; Breakfast</h3>
        <span class="meal-total" id="breakfastTotal">0 cal</span>
      </div>
      <ul class="food-list" id="breakfastList"></ul>
    </div>
    <div class="meal-section">
      <div class="meal-header">
        <h3>&#x1F31E; Lunch</h3>
        <span class="meal-total" id="lunchTotal">0 cal</span>
      </div>
      <ul class="food-list" id="lunchList"></ul>
    </div>
    <div class="meal-section">
      <div class="meal-header">
        <h3>&#x1F319; Dinner</h3>
        <span class="meal-total" id="dinnerTotal">0 cal</span>
      </div>
      <ul class="food-list" id="dinnerList"></ul>
    </div>
    <div class="meal-section">
      <div class="meal-header">
        <h3>&#x1F36A; Snacks</h3>
        <span class="meal-total" id="snacksTotal">0 cal</span>
      </div>
      <ul class="food-list" id="snacksList"></ul>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'macro_tracker';
    let currentDate = new Date();

    function getDateKey(date) {
      return date.toISOString().split('T')[0];
    }

    function getData() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getDayData() {
      const data = getData();
      const key = getDateKey(currentDate);
      if (!data[key]) {
        data[key] = { foods: [], goals: { calories: 2500, protein: 170, carbs: 260, fat: 65, fiber: 30 } };
        saveData(data);
      }
      return data[key];
    }

    function changeDate(offset) {
      currentDate.setDate(currentDate.getDate() + offset);
      render();
    }

    function updateDateDisplay() {
      const today = new Date();
      const key = getDateKey(currentDate);
      const todayKey = getDateKey(today);
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);

      let label;
      if (key === todayKey) label = 'Today';
      else if (key === getDateKey(yesterday)) label = 'Yesterday';
      else if (key === getDateKey(tomorrow)) label = 'Tomorrow';
      else label = currentDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

      document.getElementById('currentDate').textContent = label;
    }

    function toggleGoals() {
      const el = document.getElementById('goalsInputs');
      el.style.display = el.style.display === 'none' ? 'grid' : 'none';
      if (el.style.display === 'none') saveGoals();
    }

    function saveGoals() {
      const data = getData();
      const key = getDateKey(currentDate);
      if (!data[key]) data[key] = { foods: [] };
      data[key].goals = {
        calories: parseInt(document.getElementById('goalCalInput').value) || 2500,
        protein: parseInt(document.getElementById('goalProInput').value) || 170,
        carbs: parseInt(document.getElementById('goalCarbInput').value) || 260,
        fat: parseInt(document.getElementById('goalFatInput').value) || 65,
        fiber: parseInt(document.getElementById('goalFiberInput').value) || 30
      };
      saveData(data);
      render();
    }

    function quickAdd(name, cal, pro, carb, fat, fiber) {
      document.getElementById('foodName').value = name;
      document.getElementById('foodCal').value = cal;
      document.getElementById('foodPro').value = pro;
      document.getElementById('foodCarb').value = carb;
      document.getElementById('foodFat').value = fat;
      document.getElementById('foodFiber').value = fiber;
    }

    function addFood() {
      const name = document.getElementById('foodName').value.trim();
      const cal = parseFloat(document.getElementById('foodCal').value) || 0;
      const pro = parseFloat(document.getElementById('foodPro').value) || 0;
      const carb = parseFloat(document.getElementById('foodCarb').value) || 0;
      const fat = parseFloat(document.getElementById('foodFat').value) || 0;
      const fiber = parseFloat(document.getElementById('foodFiber').value) || 0;
      const meal = document.getElementById('foodMeal').value;

      if (!name) return;

      const data = getData();
      const key = getDateKey(currentDate);
      if (!data[key]) data[key] = { foods: [], goals: { calories: 2500, protein: 170, carbs: 260, fat: 65, fiber: 30 } };

      data[key].foods.push({ id: Date.now(), name, calories: cal, protein: pro, carbs: carb, fat, fiber, meal });
      saveData(data);

      document.getElementById('foodName').value = '';
      document.getElementById('foodCal').value = '';
      document.getElementById('foodPro').value = '';
      document.getElementById('foodCarb').value = '';
      document.getElementById('foodFat').value = '';
      document.getElementById('foodFiber').value = '';

      render();
    }

    function deleteFood(id) {
      const data = getData();
      const key = getDateKey(currentDate);
      data[key].foods = data[key].foods.filter(f => f.id !== id);
      saveData(data);
      render();
    }

    function render() {
      updateDateDisplay();
      const day = getDayData();
      const foods = day.foods || [];
      const goals = day.goals || { calories: 2500, protein: 170, carbs: 260, fat: 65, fiber: 30 };

      // Update goal inputs
      document.getElementById('goalCalInput').value = goals.calories;
      document.getElementById('goalProInput').value = goals.protein;
      document.getElementById('goalCarbInput').value = goals.carbs;
      document.getElementById('goalFatInput').value = goals.fat;
      document.getElementById('goalFiberInput').value = goals.fiber;

      // Calculate totals
      const totals = foods.reduce((acc, f) => ({
        calories: acc.calories + f.calories,
        protein: acc.protein + f.protein,
        carbs: acc.carbs + f.carbs,
        fat: acc.fat + f.fat,
        fiber: acc.fiber + f.fiber
      }), { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });

      // Update summary
      document.getElementById('totalCal').textContent = Math.round(totals.calories);
      document.getElementById('totalPro').textContent = Math.round(totals.protein) + 'g';
      document.getElementById('totalCarb').textContent = Math.round(totals.carbs) + 'g';
      document.getElementById('totalFat').textContent = Math.round(totals.fat) + 'g';
      document.getElementById('totalFiber').textContent = Math.round(totals.fiber) + 'g';

      document.getElementById('goalCal').textContent = '/ ' + goals.calories;
      document.getElementById('goalPro').textContent = '/ ' + goals.protein + 'g';
      document.getElementById('goalCarb').textContent = '/ ' + goals.carbs + 'g';
      document.getElementById('goalFat').textContent = '/ ' + goals.fat + 'g';
      document.getElementById('goalFiber').textContent = '/ ' + goals.fiber + 'g';

      // Update ring
      const ring = document.getElementById('calRing');
      const circumference = 2 * Math.PI * 80;
      const progress = Math.min(totals.calories / goals.calories, 1);
      ring.style.strokeDashoffset = circumference * (1 - progress);
      document.getElementById('ringValue').textContent = Math.round(totals.calories);
      document.getElementById('ringRemaining').textContent = Math.max(0, Math.round(goals.calories - totals.calories)) + ' remaining';

      // Render meals
      const meals = ['breakfast', 'lunch', 'dinner', 'snacks'];
      meals.forEach(meal => {
        const mealFoods = foods.filter(f => f.meal === meal);
        const mealCal = mealFoods.reduce((s, f) => s + f.calories, 0);
        document.getElementById(meal + 'Total').textContent = Math.round(mealCal) + ' cal';

        const list = document.getElementById(meal + 'List');
        if (mealFoods.length === 0) {
          list.innerHTML = '<li class="empty-meal">No foods logged</li>';
        } else {
          list.innerHTML = mealFoods.map(f => `
            <li class="food-item">
              <span class="food-name">${f.name}</span>
              <div class="food-macros">
                <span class="cal">${Math.round(f.calories)} cal</span>
                <span class="pro">${Math.round(f.protein)}g P</span>
                <span class="carb">${Math.round(f.carbs)}g C</span>
                <span class="fat-val">${Math.round(f.fat)}g F</span>
              </div>
              <button class="food-delete" onclick="deleteFood(${f.id})">&times;</button>
            </li>
          `).join('');
        }
      });
    }

    // Enter key
    document.getElementById('foodName').addEventListener('keydown', e => {
      if (e.key === 'Enter') addFood();
    });

    // Init
    render();
  </script>
</body>
</html>
