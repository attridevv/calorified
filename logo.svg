<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bananaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe135"/>
      <stop offset="50%" stop-color="#f7d32c"/>
      <stop offset="100%" stop-color="#e8b823"/>
    </linearGradient>
    <linearGradient id="bananaShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff59d"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
  </defs>

  <!-- Banana body (C-shaped arc) -->
  <path d="M 62 14
           C 68 18, 72 26, 72 36
           C 72 52, 58 68, 38 72
           C 26 74, 14 70, 10 60
           C 8 54, 10 46, 16 40
           C 22 34, 34 32, 46 36
           C 54 38, 60 44, 62 52
           C 63 56, 62 60, 58 62
           C 52 64, 44 62, 38 58
           C 28 52, 22 40, 28 28
           C 32 20, 44 14, 56 16
           C 62 17, 66 20, 68 24
           C 64 18, 56 14, 46 14
           C 36 14, 26 20, 22 28
           C 18 36, 20 46, 28 52
           C 36 58, 48 60, 58 56"
        fill="none" stroke="url(#bananaGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Inner highlight -->
  <path d="M 60 18
           C 66 22, 69 30, 68 38
           C 67 50, 54 64, 38 68
           C 26 70, 16 66, 14 58"
        fill="none" stroke="url(#bananaShade)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Banana tip (stem top-right, making it look like C's top curve) -->
  <ellipse cx="64" cy="16" rx="5" ry="3" fill="#6d4c00" transform="rotate(-30 64 16)"/>
</svg>
